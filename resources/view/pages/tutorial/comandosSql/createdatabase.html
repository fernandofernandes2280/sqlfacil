<strong>CREATE DATABASE</strong>
<p>Comando que cria um novo banco de dados vazio. No exemplo abaixo, vamos criar alguns banco de dados chamados “escola”, "farmacia" e 
"estoque".</p>
	<div class="card">
	  <div class="card-body text-light">
		CREATE DATABASE escola;<br>
		CREATE DATABASE farmacia;<br>
		CREATE DATABASE estoque;
	  </div>
	</div>
                    
<br>
