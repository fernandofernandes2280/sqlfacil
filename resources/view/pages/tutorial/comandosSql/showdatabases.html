<b>SHOW DATABASES</b>
<p>Utilizado caso você possua múltiplas bases de dados e deseja visualizar uma lista com os itens de cada base. Para isso, usa-se o seguinte comando:</p>
	<div class="card">
	  <div class="card-body text-light">
			SHOW DATABASES;
	  </div>
	</div>


<br>
<Label>Para mais informações, acesse a documentação do MySQL 5.7:</label>
<a target="about-blank" href="https://dev.mysql.com/doc/refman/5.7/en/show-databases.html
">https://dev.mysql.com/doc/refman/5.7/en/show-databases.html
</a>
